version: '3.8'

services:
  organization_management_service:
    build: .
    container_name: organization_management_service
    env_file:
      - .env
    ports:
      - "${REST_SERVER_PORT}:${REST_SERVER_PORT}"
    depends_on:
      postgres_organizations:
        condition: service_healthy
    networks:
      - app-network

  postgres_organizations:
    image: postgres:17-alpine
    container_name: postgres_organizations
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge