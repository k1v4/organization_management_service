version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - goconst
    - gocritic
    - gocyclo
    - govet
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    dupl:
      threshold: 200
    errcheck:
      check-blank: true
    govet:
      enable:
        - shadow
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 50
    nakedret:
      max-func-lines: 50
    staticcheck:
      checks:
        - "all"
        - "-SA6000"
        - "-QF1001"
        - "-SA2002"
        - "-ST1003"
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax